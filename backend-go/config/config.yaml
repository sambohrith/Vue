server:
  port: 3001
  mode: development
  allowed_origins:
    - http://localhost:3000
    - http://localhost:3001
    - http://127.0.0.1:3000
    - http://127.0.0.1:3001

jwt:
  secret: your-secret-key-change-in-production
  expiration: 24h

database:
  driver: mysql
  host: localhost
  port: 3306
  name: ims_db
  user: root
  password: ""
  charset: utf8mb4
  parse_time: true
  loc: Local
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600

# SQLite 配置（当 driver 为 sqlite 时使用）
sqlite:
  path: ./data/ims.db

log:
  level: info
  filename: ./logs/app.log
  max_size: 100
  max_backups: 30
  max_age: 30
  compress: true

rate_limit:
  enabled: true
  requests_per_minute: 60
  burst: 10

admin:
  default_username: admin
  default_password: admin123
  default_email: admin@example.com
